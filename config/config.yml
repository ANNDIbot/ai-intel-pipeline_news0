# ── Pipeline 全局运行参数 ─────────────────────────────────────
pipeline:
  score_threshold: 8.0   # LLM 打分高于此值才推送（与 LLMScorer 保持一致）
  max_dispatch: 10       # 单次推送最多包含 10 条最精选资讯
  state_ttl_days: 14     # 已读记录保留 14 天

# ── 语言模型配置 (The Brain) ──────────────────────────────────
llm:
  provider: "deepseek"
  concurrency: 5
  retry_attempts: 3

# ── 采集源配置 (The Sensors) ──────────────────────────────────
collectors:
  # 1. RSS 源
  # 说明：中文源全部改用媒体官方 RSS 或稳定镜像（不走 rsshub.app，在海外 IP 会被 403）
  rss:
    enabled: true
    feeds:
      # 国际官方源
      "OpenAI Blog":        "https://openai.com/news/rss.xml"
      "DeepMind Blog":      "https://deepmind.google/blog/feed/basic/"
      "NVIDIA News":        "https://nvidianews.nvidia.com/releases.xml"
      "HuggingFace Blog":   "https://huggingface.co/blog/feed.xml"
      "Google AI Blog":     "https://blog.google/technology/ai/rss/"
      # Anthropic 无官方 RSS，改用 research.google 和 engineering.fb 这两个有 RSS 的替代
      "Google Research":    "https://research.google/blog/rss/"
      "Engineering@Meta":   "https://engineering.fb.com/feed/"
      "MIT Tech Review AI": "https://www.technologyreview.com/topic/artificial-intelligence/feed"
      "The Verge AI":       "https://www.theverge.com/rss/ai-artificial-intelligence/index.xml"
      "VentureBeat AI":     "https://venturebeat.com/category/ai/feed/"
      "Ars Technica AI":    "https://feeds.arstechnica.com/arstechnica/technology-lab"
      "TechCrunch AI":      "https://techcrunch.com/category/artificial-intelligence/feed/"
      # 面向大众的科技新闻（可读性强，覆盖非技术受众）
      "BBC Technology":     "https://feeds.bbci.co.uk/news/technology/rss.xml"
      # Reuters RSS 域名已下线，删除
      "WSJ Tech":           "https://feeds.a.dj.com/rss/RSSWSJD.xml"
      "Bloomberg Tech":     "https://feeds.bloomberg.com/technology/news.rss"
      "Guardian Tech":      "https://www.theguardian.com/technology/artificialintelligenceai/rss"
      # 投融资/商业动向
      "Crunchbase News":    "https://news.crunchbase.com/feed/"
      "TechCrunch Funding": "https://techcrunch.com/category/venture/feed/"
      # 政策监管
      "Politico Tech":      "https://rss.politico.com/technology.xml"
      # 中文源（部分在海外 IP 有反爬，失败时静默跳过不影响整体）
      "量子位":              "https://www.qbitai.com/feed"
      "少数派":              "https://sspai.com/feed"
      "虎嗅科技":            "https://www.huxiu.com/rss/0.xml"
      # TopHub feed 路径近期已失效(404)，改用稳定官方源
      "36氪快讯":            "https://36kr.com/feed-newsflash"
      "新浪科技滚动":         "https://rss.sina.com.cn/tech/rollnews.xml"

  # 2. Jina Web Reader（用于无 RSS 的重点网页，按需启用）
  jina_web:
    enabled: false
    urls:
      # 机器之心返回的并非标准 RSS，改由 Jina Web Reader 按需抓取
      "机器之心": "https://www.jiqizhixin.com/"
    # 示例（按需取消注释）:
    # "智谱AI官网": "https://zhipuai.cn/news"

  # 3. 论文源 (ArXiv)
  arxiv:
    enabled: true
    categories: ["cs.AI", "cs.CL", "cs.LG", "cs.RO", "cs.CV"]
    max_results: 30

  # 4. 开发者社区
  github:
    enabled: true
    languages: ["Python", "TypeScript", "Rust"]
    # topics 字段已不再用于查询（topic 标签命中率太低）
    # 采集器改为在仓库名称和描述中搜索内置关键词列表
    topics: []
    min_stars: 30

  hackernews:
    enabled: true
    keywords: ["GPT", "Claude", "LLM", "Nvidia", "DeepSeek", "Agent", "Gemini", "AI", "model"]
    min_score: 80

  # 5. Reddit
  # !! Reddit 从 2025 年起对数据中心 IP（包括 GitHub Actions）全面返回 403，
  # !! 换 User-Agent 也无效。已禁用，不要启用。
  # !! 替代方案：通过 HackerNews 的 "Show HN" 和 "Ask HN" 帖子间接获取 Reddit 热点。
  reddit:
    enabled: false
    subreddits: ["MachineLearning", "LocalLLaMA", "artificial", "ChatGPT"]
    min_score: 100

# ── 分发器配置 (The Voice) ────────────────────────────────────
dispatchers:
  wecom:
    enabled: true
    # 通过 GitHub Actions Secret: WECOM_WEBHOOK_URL 注入
    webhook_url: ""
